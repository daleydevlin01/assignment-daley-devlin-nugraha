<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLT Panel Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-4">
        <h1 class="mb-4">CLT Panel Properties</h1>
        <div class="row">
            <div class="col-md-5">
                <h3>Input</h3>
                <form id="panelForm">
                    <div class="mb-3">
                        <label class="form-label">Metode</label>
                        <select class="form-select" id="method">
                            <option value="ShearAnalogy">Shear Analogy</option>
                            <option value="Gamma">Gamma</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Grade</label>
                        <select class="form-select" id="grade">
                            <option value="MGP10">MGP10</option>
                            <option value="MGP12">MGP12</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Jumlah Layer</label>
                        <input type="number" class="form-control" id="numLayers" value="5" min="3" max="9" step="2">
                        <small class="text-muted">Shear: 3-9 (ganjil) | Gamma: 3 atau 5</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tebal Layer (mm)</label>
                        <input type="number" class="form-control" id="thickness" value="35" step="1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Lebar Efektif (mm)</label>
                        <input type="number" class="form-control" id="beff" value="1000" step="1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Panjang Panel (mm)</label>
                        <input type="number" class="form-control" id="length" value="5000" step="1">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Hitung</button>
                </form>
            </div>
            <div class="col-md-7">
                <h3>Output</h3>
                <div id="resultContainer">
                    <div class="alert alert-secondary">Hasil perhitungan akan muncul di sini.</div>
                </div>
            </div>
        </div>
    </div>

    <script src="type/material-grade-type.js"></script>
    <script src="type/clt-layer-type.js"></script>
    <script src="type/clt-layer-properties-type.js"></script>
    <script src="type/clt-layup-type.js"></script>
    <script src="type/panel-properties-type.js"></script>
    <script src="calculation/panel-properties.js"></script>
    <script src="calculator.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
